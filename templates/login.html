    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Login</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <main class="card">
            <h2>Teacher Authorization</h2>
            <form action="/login" method="POST">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="e.g. teacher" class="form-control" style="width:100%;">
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="••••••••" class="form-control" style="width:100%;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Access Admin Panel</button>
            </form>
            <p style="text-align: center; margin-top: 15px;"><a href="/">Return to Public Terminal</a></p>
        </main>
    </div>
</body>
</html>
